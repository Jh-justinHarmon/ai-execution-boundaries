<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <style>
      .boundary-box { fill: #e8f5e9; stroke: #2e7d32; stroke-width: 3; }
      .runtime-box { fill: #f5f5f5; stroke: #666; stroke-width: 1; }
      .data-box { fill: #f5f5f5; stroke: #666; stroke-width: 1; }
      .node { fill: white; stroke: #333; stroke-width: 2; }
      .decision { fill: white; stroke: #2e7d32; stroke-width: 2; }
      .text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; fill: #333; }
      .label { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 12px; fill: #666; }
      .title { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 16px; font-weight: 600; fill: #333; }
      .arrow { stroke: #666; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .allow-arrow { stroke: #2e7d32; stroke-width: 2; fill: none; marker-end: url(#arrowhead-green); }
      .deny-arrow { stroke: #c62828; stroke-width: 2; fill: none; marker-end: url(#arrowhead-red); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#666" />
    </marker>
    <marker id="arrowhead-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#2e7d32" />
    </marker>
    <marker id="arrowhead-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#c62828" />
    </marker>
  </defs>
  
  <!-- LLM Agent Runtime -->
  <rect class="runtime-box" x="50" y="50" width="700" height="100" rx="4" />
  <text class="title" x="70" y="80">LLM Agent Runtime</text>
  <rect class="node" x="300" y="95" width="200" height="40" rx="4" />
  <text class="text" x="400" y="120" text-anchor="middle">Tool Call Request</text>
  
  <!-- Execution Boundary -->
  <rect class="boundary-box" x="50" y="200" width="700" height="200" rx="4" />
  <text class="title" x="70" y="230">Execution Boundary</text>
  
  <rect class="node" x="150" y="260" width="180" height="40" rx="4" />
  <text class="text" x="240" y="285" text-anchor="middle">Policy Evaluation</text>
  
  <polygon class="decision" points="400,260 460,280 400,300 340,280" />
  <text class="text" x="400" y="285" text-anchor="middle">Decision</text>
  
  <rect class="node" x="520" y="260" width="150" height="40" rx="4" />
  <text class="text" x="595" y="285" text-anchor="middle">Audit Logger</text>
  
  <!-- Data Plane -->
  <rect class="data-box" x="50" y="450" width="700" height="100" rx="4" />
  <text class="title" x="70" y="480">Data Plane</text>
  
  <rect class="node" x="150" y="495" width="180" height="40" rx="4" />
  <text class="text" x="240" y="520" text-anchor="middle">Database Execute</text>
  
  <rect class="node" x="470" y="495" width="200" height="40" rx="4" />
  <text class="text" x="570" y="520" text-anchor="middle">BoundaryViolation</text>
  
  <!-- Arrows -->
  <path class="arrow" d="M 400 135 L 400 180 L 240 180 L 240 260" />
  <text class="label" x="250" y="175">invoke</text>
  
  <path class="arrow" d="M 330 280 L 340 280" />
  
  <path class="allow-arrow" d="M 460 280 L 520 280" />
  <text class="label" x="470" y="275" fill="#2e7d32">ALLOW</text>
  
  <path class="deny-arrow" d="M 400 300 L 400 350 L 570 350 L 570 495" />
  <text class="label" x="410" y="330" fill="#c62828">DENY</text>
  
  <path class="arrow" d="M 595 300 L 595 350 L 240 350 L 240 495" />
  
  <path class="arrow" d="M 570 495 L 570 420 L 595 420 L 595 300" />
</svg>
